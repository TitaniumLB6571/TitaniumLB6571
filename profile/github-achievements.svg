<svg width="430" height="220" viewBox="0 0 430 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TitaniumLB6571 GitHub achievements</title>
  <desc id="desc">Public GitHub achievements include YOLO earned twice, Pair Extraordinaire, and Quickdraw, along with a few notable public repositories.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="430" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101826"/>
      <stop offset="1" stop-color="#1A2233"/>
    </linearGradient>
    <linearGradient id="accent2" x1="20" y1="20" x2="410" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#7EE787"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="428" height="218" rx="18" fill="url(#bg2)" stroke="url(#accent2)" stroke-width="2"/>
  <text x="24" y="36" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Achievements</text>
  <text x="24" y="58" fill="#7EE787" font-family="Segoe UI, Arial, sans-serif" font-size="12">Pulled from the public profile page</text>

  <rect x="24" y="76" width="382" height="32" rx="10" fill="#162033"/>
  <text x="38" y="97" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">YOLO x2</text>

  <rect x="24" y="116" width="182" height="32" rx="10" fill="#162033"/>
  <text x="38" y="137" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Pair Extraordinaire</text>

  <rect x="224" y="116" width="182" height="32" rx="10" fill="#162033"/>
  <text x="238" y="137" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Quickdraw</text>

  <text x="24" y="172" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="12">Popular public repositories</text>
  <text x="24" y="192" fill="#F0F6FC" font-family="Segoe UI, Arial, sans-serif" font-size="13">TitanCommandSpy  •  OpenAPI  •  BasicEssentials</text>
  <text x="24" y="208" fill="#8B949E" font-family="Segoe UI, Arial, sans-serif" font-size="11">Static card to avoid flaky third-party live embeds</text>
